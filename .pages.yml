media:
  input: src/features/content-management/content/images
  output: /src/features/content-management/content/images

content:
  - name: team
    label: Team Members
    type: collection
    path: src/features/content-management/content/data/team
    filename: "{slug}.md"
    fields:
      - name: name
        label: Full Name
        type: string
        required: true
      - name: roleDescription
        label: Job Title / Role
        type: string
        required: true
      - name: credentials
        label: Credentials (e.g. C.Psych.)
        type: string
      - name: sortOrder
        label: Sort Order (Order of appearance)
        type: number
        default: 0
      - name: image
        label: Card Image (.webp file)
        type: image
        description: "Please select a WebP format image."
      - name: imageDescription
        label: Image Description (For people using screen readers)
        type: string
      - name: body
        label: Biography
        type: rich-text

  - name: services
    label: Our Services
    type: collection
    path: src/features/content-management/content/data/services
    filename: "{slug}.md"
    fields:
      - name: title
        label: Service Title
        type: string
        required: true
      - name: subtitle
        label: Brief Tagline / Subtitle
        type: string
        required: true
      - name: sortOrder
        label: Sort Order (Order of appearance)
        type: number
        default: 0
      - name: image
        label: Card Image (.webp file)
        type: image
        description: "Please select a WebP format image."
      - name: imageDescription
        label: Image Description (For people using screen readers)
        type: string
      - name: body
        label: Detailed Service Description
        type: rich-text

  - name: accordion_service
    label: Services FAQ Accordion
    type: file
    path: src/features/content-management/content/data/accordions/accordion-service.md
    fields:
      - name: title
        label: FAQ Section Title
        type: string
        required: true
      - name: entries
        label: FAQ Entries
        type: object
        list: true
        fields:
          - name: summary
            label: Question
            type: string
            required: true
          - name: details
            label: Answer
            type: rich-text
            required: true

  - name: accordion_contact
    label: Crisis Support Accordion
    type: file
    path: src/features/content-management/content/data/accordions/accordion-contact.md
    fields:
      - name: entries
        label: Accordion Segments
        type: object
        list: true
        fields:
          - name: summary
            label: Header Title / Trigger
            type: string
            required: true
          - name: details
            label: Detailed Info
            type: rich-text
            required: true